name: Auto-merge content PRs

# Auto-merge a PR into `main` if and only if it has no merge conflict with `main`
# (GitHub reports it MERGEABLE). When conflict-free, it's merged with rebase +
# fast-forward. If there's a conflict, the workflow logs it and leaves the PR alone.
#
# After merging, we explicitly kick the Pages deploy via `workflow_dispatch`. A merge
# performed with the GITHUB_TOKEN does NOT create new workflow runs for the resulting
# push OR pull_request:closed event (GitHub suppresses GITHUB_TOKEN-triggered events to
# avoid recursion), so static.yml would never fire on its own. `workflow_dispatch` is one
# of the two events exempt from that suppression, so dispatching it here works.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

# Same-repo PRs get a read/write GITHUB_TOKEN with these scopes.
# (Fork PRs get a read-only token, so they can't be auto-merged — by design.)
permissions:
  actions: write        # needed to dispatch the static.yml deploy after merging
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-merge:
    # Never touch draft PRs.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      PR: ${{ github.event.pull_request.number }}
    steps:
      - name: Merge if conflict-free
        run: |
          set -euo pipefail

          # GitHub computes mergeability asynchronously; poll until it's known.
          state="UNKNOWN"
          for i in $(seq 1 12); do
            state="$(gh pr view "$PR" --repo "$REPO" --json mergeable --jq '.mergeable')"
            echo "Attempt $i: mergeable=$state"
            [ "$state" != "UNKNOWN" ] && break
            sleep 5
          done

          if [ "$state" != "MERGEABLE" ]; then
            echo "PR is not conflict-free (mergeable=$state) — leaving it for a human."
            exit 0
          fi

          echo "Conflict-free — merging with rebase + fast-forward."
          gh pr merge "$PR" --repo "$REPO" --rebase --delete-branch

          echo "Merged — dispatching the Pages deploy (GITHUB_TOKEN merges don't auto-trigger it)."
          gh workflow run static.yml --repo "$REPO" --ref main
