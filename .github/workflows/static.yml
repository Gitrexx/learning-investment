# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Run manually from the Actions tab, and — importantly — dispatched by
  # auto-merge-content.yml right after it merges a content PR. A merge done with the
  # GITHUB_TOKEN does NOT trigger push/pull_request workflow runs (GitHub suppresses
  # GITHUB_TOKEN-triggered events to avoid recursion), and workflow_dispatch is exempt
  # from that suppression, so dispatching this is how auto-merged content gets deployed.
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Always deploy the canonical main branch (its content includes the just-merged PR).
          ref: main
      - name: Build content manifest
        run: python3 scripts/build_manifest.py
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
