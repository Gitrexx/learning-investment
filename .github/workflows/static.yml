# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Runs when a pull request is merged into the default branch.
  # A merge done via GITHUB_TOKEN (e.g. the auto-merge workflow) does NOT emit a push
  # that triggers workflows, so we also deploy off the PR "closed" event — guarded by
  # `merged == true` on the deploy job below so PRs closed without merging are ignored.
  pull_request:
    types: [closed]
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    # Deploy on direct pushes to main and manual runs; for pull_request events only
    # when the PR was actually merged (skip PRs closed without merging).
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Always deploy the canonical main branch (its content includes the just-merged PR).
          ref: main
      - name: Build content manifest
        run: python3 scripts/build_manifest.py
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
